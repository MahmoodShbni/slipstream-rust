name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 ──────────────────────────────────────────────────
          # ubuntu-22.04 = glibc 2.35 → binary runs on 22.04 and any newer release.
          - name: linux-amd64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: slipstream-linux-amd64
            exe_ext: ""

          # ── Windows x86_64 ───────────────────────────────────────────────
          - name: windows-amd64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: slipstream-windows-amd64
            exe_ext: ".exe"

    steps:
      # ── Source ─────────────────────────────────────────────────────────────
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ════════════════════════════════════════════════════════════════════════
      # LINUX
      # ════════════════════════════════════════════════════════════════════════
      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libssl-dev python3 ninja-build

      - name: Build picoquic (Linux)
        if: runner.os == 'Linux'
        run: |
          bash scripts/build_picoquic.sh
          echo "PICOQUIC_BUILD_DIR=${{ github.workspace }}/.picoquic-build" >> $GITHUB_ENV

      # ════════════════════════════════════════════════════════════════════════
      # WINDOWS
      # ════════════════════════════════════════════════════════════════════════

      # cmake + ninja are pre-installed. strawberryperl gives us a Perl that
      # openssl-src needs to configure OpenSSL. pkgconfiglite provides pkg-config.
      - name: Install build dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install pkgconfiglite strawberryperl --no-progress -y
          # Expose Strawberry Perl on PATH so openssl-src can find it
          $perl = "C:\Strawberry\perl\bin"
          if (Test-Path $perl) {
            echo "$perl" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

      # Build picoquic with MSVC (Visual Studio 17 2022).
      # Git Bash is available on all windows-latest runners — use it to run
      # the bash script without needing MSYS2.
      - name: Build picoquic (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          PICOQUIC_DIR="${GITHUB_WORKSPACE}/vendor/picoquic"
          BUILD_DIR="${GITHUB_WORKSPACE}/.picoquic-build"

          CMAKE_ARGS=(
            -S "$PICOQUIC_DIR"
            -B "$BUILD_DIR"
            -G "Visual Studio 17 2022" -A x64
            -DCMAKE_BUILD_TYPE=Release
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5
            -DPICOQUIC_FETCH_PTLS=ON
            -DBUILD_TESTING=OFF
            -Dpicoquic_BUILD_TESTS=OFF
            -Wno-dev
          )

          # First cmake run fetches picotls via FetchContent
          cmake "${CMAKE_ARGS[@]}" || true

          # ── Patch picotls: arpa/inet.h does not exist on Windows ──────────
          # picotls/lib/picotls.c includes <arpa/inet.h> which is POSIX-only.
          # Replace it with <winsock2.h> inside a WIN32 guard.
          PTLS_C="$BUILD_DIR/_deps/picotls-src/lib/picotls.c"
          if [ -f "$PTLS_C" ]; then
            sed -i 's|#include <arpa/inet.h>|#ifdef _WIN32\n#include <winsock2.h>\n#else\n#include <arpa/inet.h>\n#endif|g' "$PTLS_C"
          fi

          # Same fix for any other picotls source that pulls in arpa/inet.h
          find "$BUILD_DIR/_deps/picotls-src" -name "*.c" -o -name "*.h" 2>/dev/null | \
            xargs grep -l "arpa/inet.h" | while read f; do
              sed -i 's|#include <arpa/inet.h>|#ifdef _WIN32\n#include <winsock2.h>\n#else\n#include <arpa/inet.h>\n#endif|g' "$f"
            done

          # ── Full configure + build ────────────────────────────────────────
          cmake "${CMAKE_ARGS[@]}"
          cmake --build "$BUILD_DIR" --config Release \
            --target picoquic-core picotls-core picotls-fusion picotls-minicrypto picotls-openssl

          # ── Expose .lib files as lib<name>.a so build.rs find_lib_variant() ─
          # build.rs looks for libpicoquic-core.a / libpicotls-core.a etc.
          RELEASE_DIR="$BUILD_DIR/Release"
          PTLS_RELEASE="$BUILD_DIR/_deps/picotls-build/Release"
          mkdir -p "$RELEASE_DIR"
          for lib in picoquic-core; do
            [ -f "$RELEASE_DIR/${lib}.lib" ] && cp "$RELEASE_DIR/${lib}.lib" "$RELEASE_DIR/lib${lib}.a"
          done
          for lib in picotls-core picotls-fusion picotls-minicrypto picotls-openssl; do
            [ -f "$PTLS_RELEASE/${lib}.lib" ] && cp "$PTLS_RELEASE/${lib}.lib" "$RELEASE_DIR/lib${lib}.a"
          done

          echo "PICOQUIC_BUILD_DIR=$BUILD_DIR" >> $GITHUB_ENV
          echo "PICOQUIC_LIB_DIR=$RELEASE_DIR" >> $GITHUB_ENV

      # Patch build.rs so it works on Windows MSVC:
      #   1. Link ws2_32 instead of pthread (MSVC has no libpthread).
      #   2. Use libssl / libcrypto naming (Windows DLL import lib names).
      - name: Patch build.rs for Windows (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          BUILD_RS="crates/slipstream-ffi/build.rs"

          # Add is_windows flag right after `let target = ...`
          sed -i 's/let target = env::var("TARGET").unwrap_or_default();/let target = env::var("TARGET").unwrap_or_default();\n    let is_windows = target.contains("windows");/' "$BUILD_RS"

          # Replace unconditional pthread link with platform-aware version
          sed -i 's/println!("cargo:rustc-link-lib=dylib=pthread");/if is_windows {\n        println!("cargo:rustc-link-lib=dylib=ws2_32");\n        println!("cargo:rustc-link-lib=dylib=bcrypt");\n        println!("cargo:rustc-link-lib=dylib=ntdll");\n    } else {\n        println!("cargo:rustc-link-lib=dylib=pthread");\n    }/' "$BUILD_RS"

      # ════════════════════════════════════════════════════════════════════════
      # RUST TOOLCHAIN (shared)
      # ════════════════════════════════════════════════════════════════════════
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      # ════════════════════════════════════════════════════════════════════════
      # BUILD BINARIES
      # ════════════════════════════════════════════════════════════════════════

      # Linux: system OpenSSL, picoquic pre-built above.
      - name: Build binaries (Linux)
        if: runner.os == 'Linux'
        env:
          PICOQUIC_AUTO_BUILD: "0"
        run: |
          cargo build -p slipstream-client -p slipstream-server --release --target ${{ matrix.target }}

      # Windows: openssl-vendored bundles OpenSSL into the .exe so it runs
      # on any Windows machine without a separate OpenSSL install.
      # PICOQUIC_AUTO_BUILD=0 skips build.rs trying to exec build_picoquic.sh
      # (a bash script is not a valid Win32 executable → OS error 193).
      - name: Build binaries (Windows)
        if: runner.os == 'Windows'
        env:
          PICOQUIC_AUTO_BUILD: "0"
        run: |
          cargo build -p slipstream-client -p slipstream-server --release --target ${{ matrix.target }} --features openssl-vendored

      # ════════════════════════════════════════════════════════════════════════
      # PACKAGE
      # ════════════════════════════════════════════════════════════════════════
      - name: Package binaries (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          BIN="target/${{ matrix.target }}/release"
          mkdir -p dist
          cp "$BIN/slipstream-client" dist/
          cp "$BIN/slipstream-server" dist/
          cd dist
          sha256sum slipstream-client slipstream-server > ${{ matrix.artifact_name }}.sha256
          cat ${{ matrix.artifact_name }}.sha256

      - name: Package binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $Bin  = "target\${{ matrix.target }}\release"
          $Dist = "dist"
          New-Item -ItemType Directory -Force -Path $Dist | Out-Null
          Copy-Item "$Bin\slipstream-client.exe" $Dist
          Copy-Item "$Bin\slipstream-server.exe" $Dist
          Push-Location $Dist
          $hash = Get-FileHash "slipstream-client.exe","slipstream-server.exe" -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  $($_.Path | Split-Path -Leaf)" }
          $hash | Set-Content "${{ matrix.artifact_name }}.sha256"
          Get-Content "${{ matrix.artifact_name }}.sha256"
          Pop-Location

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/
          if-no-files-found: error

  # ── GitHub Release (tag pushes only) ───────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
