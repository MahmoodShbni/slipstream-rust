name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 ──────────────────────────────────────────────────
          # Build on ubuntu-22.04 (glibc 2.35) so the binary runs on
          # Ubuntu 22.04 and any newer Ubuntu / Debian-family release.
          # Building on a newer runner would produce a binary that requires
          # a newer glibc and would fail to start on 22.04.
          - name: linux-amd64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: slipstream-linux-amd64
            # Use system OpenSSL — smaller binary, no vendoring needed on Linux.
            cargo_features: ""
            client_bin: slipstream-client
            server_bin: slipstream-server

          # ── Windows x86_64 ───────────────────────────────────────────────
          - name: windows-amd64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: slipstream-windows-amd64
            # openssl-vendored: bundles OpenSSL into the binary so the .exe
            # runs on any Windows machine without extra runtime dependencies.
            cargo_features: "--features openssl-vendored"
            client_bin: slipstream-client.exe
            server_bin: slipstream-server.exe

    steps:
      # ── Source ─────────────────────────────────────────────────────────────
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Per-platform build dependencies ────────────────────────────────────
      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libssl-dev python3 ninja-build

      - name: Install build dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # cmake and ninja are pre-installed on windows-latest runners.
          # NASM is required by the vendored OpenSSL build.
          choco install nasm --no-progress -y
          echo "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # ── Rust toolchain ─────────────────────────────────────────────────────
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cache Cargo registry + compiled deps to speed up repeat builds.
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      # ── Build ───────────────────────────────────────────────────────────────
      - name: Build slipstream-client
        run: >
          cargo build
          -p slipstream-client
          --release
          --target ${{ matrix.target }}
          ${{ matrix.cargo_features }}

      - name: Build slipstream-server
        run: >
          cargo build
          -p slipstream-server
          --release
          --target ${{ matrix.target }}
          ${{ matrix.cargo_features }}

      # ── Package ─────────────────────────────────────────────────────────────
      - name: Package binaries (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          BIN_DIR="target/${{ matrix.target }}/release"
          DIST="dist"
          mkdir -p "${DIST}"
          cp "${BIN_DIR}/slipstream-client" "${DIST}/"
          cp "${BIN_DIR}/slipstream-server" "${DIST}/"
          cd "${DIST}"
          sha256sum slipstream-client slipstream-server \
            > "${{ matrix.artifact_name }}.sha256"
          cat "${{ matrix.artifact_name }}.sha256"

      - name: Package binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $BinDir = "target\${{ matrix.target }}\release"
          $Dist   = "dist"
          New-Item -ItemType Directory -Force -Path $Dist | Out-Null
          Copy-Item "$BinDir\slipstream-client.exe" $Dist
          Copy-Item "$BinDir\slipstream-server.exe" $Dist
          Push-Location $Dist
          $hash = Get-FileHash "slipstream-client.exe","slipstream-server.exe" -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  $($_.Path | Split-Path -Leaf)" }
          $hash | Set-Content "${{ matrix.artifact_name }}.sha256"
          Get-Content "${{ matrix.artifact_name }}.sha256"
          Pop-Location

      # ── Upload artifact ─────────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/
          if-no-files-found: error

  # ── Attach artifacts to the GitHub Release (tag pushes only) ───────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Display downloaded files
        run: find artifacts/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
