name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 ──────────────────────────────────────────────────
          # Build on ubuntu-22.04 (glibc 2.35) so the binary runs on
          # Ubuntu 22.04 and any newer Ubuntu / Debian-family release.
          # Building on a newer runner would produce a binary that requires
          # a newer glibc and would fail to start on 22.04.
          - name: linux-amd64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: slipstream-linux-amd64
            cargo_features: ""
            client_bin: slipstream-client
            server_bin: slipstream-server

          # ── Windows x86_64 ───────────────────────────────────────────────
          # Uses MinGW (x86_64-pc-windows-gnu) via MSYS2 rather than MSVC.
          #
          # Why not MSVC (x86_64-pc-windows-msvc)?
          #   build.rs auto-builds picoquic by executing scripts/build_picoquic.sh.
          #   On Windows, Command::new("...build_picoquic.sh") fails with OS error
          #   193 "not a valid Win32 application" because .sh files are not native
          #   Win32 executables. The fix is to pre-build picoquic using MSYS2 bash
          #   BEFORE cargo runs, then set PICOQUIC_AUTO_BUILD=0 to skip the shell
          #   call in build.rs.
          #
          # Why not openssl-vendored on Windows?
          #   openssl-vendored vendors OpenSSL for Rust, but picoquic also needs
          #   OpenSSL at cmake time (a separate build). It is simpler and faster
          #   to install one copy of OpenSSL via MSYS2 and share it between both.
          #
          # Why MinGW instead of MSVC?
          #   build.rs unconditionally links -lpthread (except on Android).
          #   MinGW/MSYS2 ships libpthread natively; MSVC does not.
          - name: windows-amd64
            runner: windows-latest
            target: x86_64-pc-windows-gnu
            artifact_name: slipstream-windows-amd64
            cargo_features: ""
            client_bin: slipstream-client.exe
            server_bin: slipstream-server.exe

    steps:
      # ── Source ─────────────────────────────────────────────────────────────
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Linux: system build dependencies ───────────────────────────────────
      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libssl-dev python3 ninja-build

      # ── Windows: MSYS2 / MinGW64 environment ───────────────────────────────
      # Provides: bash, cmake, ninja, gcc, OpenSSL, pkg-config, python3.
      # Everything picoquic needs to build is available in this one step.
      - name: Set up MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-pkg-config
            python3

      # Pre-build picoquic using MSYS2 bash. This must happen before `cargo
      # build` so that build.rs finds the already-compiled libs and skips
      # the auto-build (which would fail trying to execute the .sh script
      # as a native Win32 process).
      - name: Pre-build picoquic (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        env:
          PICOQUIC_BUILD_DIR: .picoquic-build
          OPENSSL_ROOT_DIR: /mingw64
        run: bash scripts/build_picoquic.sh

      # ── Rust toolchain ─────────────────────────────────────────────────────
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cache Cargo registry + compiled deps to speed up repeat builds.
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      # ── Build (Linux) ───────────────────────────────────────────────────────
      - name: Build slipstream-client (Linux)
        if: runner.os == 'Linux'
        run: cargo build -p slipstream-client --release --target ${{ matrix.target }}

      - name: Build slipstream-server (Linux)
        if: runner.os == 'Linux'
        run: cargo build -p slipstream-server --release --target ${{ matrix.target }}

      # ── Build (Windows) ─────────────────────────────────────────────────────
      # Run cargo inside MSYS2 so that:
      #   - MinGW gcc/g++ are on PATH for the `cc` crate to compile C files.
      #   - pkg-config can locate the MSYS2 OpenSSL for openssl-sys.
      #   - PICOQUIC_AUTO_BUILD=0 prevents build.rs from re-running build_picoquic.sh.
      #   - PICOQUIC_BUILD_DIR points to the libs we pre-built above.
      - name: Build slipstream-client (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        env:
          PICOQUIC_AUTO_BUILD: "0"
          PICOQUIC_BUILD_DIR: .picoquic-build
          OPENSSL_ROOT_DIR: /mingw64
          PKG_CONFIG_PATH: /mingw64/lib/pkgconfig
        run: cargo build -p slipstream-client --release --target ${{ matrix.target }}

      - name: Build slipstream-server (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        env:
          PICOQUIC_AUTO_BUILD: "0"
          PICOQUIC_BUILD_DIR: .picoquic-build
          OPENSSL_ROOT_DIR: /mingw64
          PKG_CONFIG_PATH: /mingw64/lib/pkgconfig
        run: cargo build -p slipstream-server --release --target ${{ matrix.target }}

      # ── Package ─────────────────────────────────────────────────────────────
      - name: Package binaries (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          BIN_DIR="target/${{ matrix.target }}/release"
          DIST="dist"
          mkdir -p "${DIST}"
          cp "${BIN_DIR}/slipstream-client" "${DIST}/"
          cp "${BIN_DIR}/slipstream-server" "${DIST}/"
          cd "${DIST}"
          sha256sum slipstream-client slipstream-server \
            > "${{ matrix.artifact_name }}.sha256"
          cat "${{ matrix.artifact_name }}.sha256"

      - name: Package binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $BinDir = "target\${{ matrix.target }}\release"
          $Dist   = "dist"
          New-Item -ItemType Directory -Force -Path $Dist | Out-Null
          Copy-Item "$BinDir\slipstream-client.exe" $Dist
          Copy-Item "$BinDir\slipstream-server.exe" $Dist
          Push-Location $Dist
          $hash = Get-FileHash "slipstream-client.exe","slipstream-server.exe" -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  $($_.Path | Split-Path -Leaf)" }
          $hash | Set-Content "${{ matrix.artifact_name }}.sha256"
          Get-Content "${{ matrix.artifact_name }}.sha256"
          Pop-Location

      # ── Upload artifact ─────────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/
          if-no-files-found: error

  # ── Attach artifacts to the GitHub Release (tag pushes only) ───────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Display downloaded files
        run: find artifacts/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
