name: Build (client + server) - Ubuntu (Linux + Windows artifacts)

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            target: x86_64-unknown-linux-gnu
            artifact_base: slipstream-ubuntu-22.04-x86_64
          - name: windows-x86_64-gnu
            target: x86_64-pc-windows-gnu
            artifact_base: slipstream-windows-x86_64-gnu

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install deps (Linux + Windows cross)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake pkg-config python3 \
            libssl-dev \
            gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo + build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.name }}
          cache-on-failure: true

      - name: Build (release) - client
        run: |
          set -euo pipefail
          cargo build -p slipstream-client --release --target "${{ matrix.target }}"

      - name: Build (release) - server
        run: |
          set -euo pipefail
          cargo build -p slipstream-server --release --target "${{ matrix.target }}"

      - name: Package artifacts
        run: |
          set -euo pipefail
          dist="dist"
          mkdir -p "$dist"
          bin_dir="target/${{ matrix.target }}/release"

          if [[ "${{ matrix.target }}" == "x86_64-pc-windows-gnu" ]]; then
            cp "${bin_dir}/slipstream-client.exe" "$dist/"
            cp "${bin_dir}/slipstream-server.exe" "$dist/"
            (cd "$dist" && sha256sum slipstream-client.exe slipstream-server.exe > "${{ matrix.artifact_base }}.sha256")
            (cd "$dist" && zip -r "../${{ matrix.artifact_base }}.zip" .)
          else
            cp "${bin_dir}/slipstream-client" "$dist/"
            cp "${bin_dir}/slipstream-server" "$dist/"
            (cd "$dist" && sha256sum slipstream-client slipstream-server > "${{ matrix.artifact_base }}.sha256")
            tar -czf "${{ matrix.artifact_base }}.tar.gz" -C "$dist" .
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_base }}
          path: |
            ${{ matrix.artifact_base }}.tar.gz
            ${{ matrix.artifact_base }}.zip
            dist/*.sha256
          if-no-files-found: error
